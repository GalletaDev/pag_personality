<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notices - GalletaDev</title>
    <link rel="stylesheet" href="../style/style_general.css"> <!--archivo de estilos general-->
    <link rel="stylesheet" href="../style/style_indice.css"> <!--Para indices-->
    <link rel="stylesheet" href="../style/style_loading.css"> <!--index de cargar pantalla-->

<body id="main-content">

    <!-- Contenido de noticias -->

                <nav class="side_scroll">
                    <div class="indice-noticias">

                        <ul id="indiceNotice">

                    </div>
                </nav>
            </div>
        </div>
    </section>

    <!-- Lista de noticias -->
    <section class="banner_s">
        <button class="button_decoration_movil banner_s" id="toggleButton">Mostrar/Ocultar sección</button>

        <div class="container_list_load2">
            <h1 class="cabezal_h1">Foros GalletaDev</h1>
            <p>Noticias y avances</p>
            <div id="notices" class="devlog-section"></div>

        <footer class="foster">

        </footer>

    <script src="../scripts/button_show_hide.js"></script>
